[platformio]
src_dir = src

[env:unihiker_k10_spectrum]
platform = https://github.com/DFRobot/platform-unihiker.git
framework = espidf
board = unihiker_k10
monitor_speed = 115200
monitor_filters = direct
extra_scripts = extra_script.py
board_build.partitions = scr/partitions.csv
build_flags = -IC:/Users/teren/.platformio/packages/framework-arduinounihiker/tools/sdk/esp32s3/include/esp_littlefs/include -LC:/Users/teren/.platformio/packages/framework-arduinounihiker/tools/sdk/esp32s3/lib -lesp_littlefs
